<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Flappy Flight cover</title>
  <desc id="desc">A premium arcade bird flying through neon pipe gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#17233b"/>
      <stop offset=".58" stop-color="#0b1322"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1400" height="760" fill="url(#bg)"/>
  <circle cx="240" cy="150" r="210" fill="#67d9ff" opacity=".13" filter="url(#soft)"/>
  <circle cx="1140" cy="610" r="250" fill="#62ffae" opacity=".12" filter="url(#soft)"/>
  <g fill="#62ffae">
    <rect x="950" y="0" width="110" height="250" rx="22"/>
    <rect x="928" y="228" width="154" height="40" rx="16"/>
    <rect x="950" y="470" width="110" height="290" rx="22"/>
    <rect x="928" y="452" width="154" height="40" rx="16"/>
    <rect x="1160" y="0" width="98" height="160" rx="20" opacity=".6"/>
    <rect x="1142" y="146" width="134" height="36" rx="14" opacity=".6"/>
    <rect x="1160" y="390" width="98" height="370" rx="20" opacity=".6"/>
  </g>
  <g transform="translate(585 344) rotate(-7)">
    <rect x="-92" y="-58" width="184" height="116" rx="50" fill="#ffd166"/>
    <rect x="-22" y="18" width="104" height="32" rx="16" fill="#62ffae"/>
    <circle cx="44" cy="-20" r="22" fill="#f8fbff"/>
    <circle cx="51" cy="-20" r="8" fill="#061018"/>
    <path d="M92-8l70 28-70 28z" fill="#ff746b"/>
  </g>
  <path d="M0 626h1400" stroke="#62ffae" stroke-opacity=".72" stroke-width="5"/>
  <text x="92" y="282" fill="#62ffae" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="8">PIXLO ORIGINAL</text>
  <text x="92" y="364" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="96" font-weight="950">Flappy Flight</text>
  <text x="98" y="420" fill="#a6b1c2" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Tap, flap, and thread every neon gate.</text>
