  <circle cx="184" cy="196" r="56" fill="#5cffad" opacity="0.9" />
  <rect x="284" y="152" width="180" height="32" rx="16" fill="#fbbf24" opacity="0.95" />
  <rect x="284" y="214" width="244" height="28" rx="14" fill="#38bdf8" opacity="0.82" />
  <rect x="112" y="312" width="416" height="54" rx="16" fill="#ffffff" opacity="0.08" />
  <text
    x="320"
    y="348"
