  viewBox="0 0 640 480"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">GameDistribution game thumbnail placeholder</title>
  <desc id="desc">
    A PixloGames placeholder thumbnail for remote GameDistribution browser games.
  </desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071014" />
      <stop offset="0.55" stop-color="#111827" />
      <stop offset="1" stop-color="#18231f" />
    </linearGradient>
  </defs>
  <rect width="640" height="480" fill="url(#bg)" />
  <rect
    x="56"
    y="54"
    width="528"
