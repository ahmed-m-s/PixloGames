<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Snake is a lightweight HTML5 arcade game for PixloGames." />
    <title>Snake | PixloGames</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="Snake game">
      <section class="game-card">
        <header class="game-header">
          <div>
            <p class="eyebrow">PixloGames</p>
            <h1>Snake</h1>
          </div>
          <div class="stats">
            <div class="stat">
              <span>Score</span>
              <strong id="scoreValue">0</strong>
            </div>
            <div class="stat">
              <span>Best</span>
              <strong id="bestValue">0</strong>
            </div>
          </div>
        </header>

        <section class="canvas-wrap" id="gameFrame">
          <canvas id="gameCanvas" width="640" height="640" aria-label="Snake game canvas"></canvas>

          <div class="overlay is-visible" id="startScreen">
            <div class="overlay-panel">
              <p class="eyebrow">Classic Arcade</p>
              <h2>Grow clean. Turn sharp.</h2>
              <p>Collect pickups, avoid walls, and do not cross your own trail.</p>
              <button class="game-button" id="startButton" type="button">Start Game</button>
              <p class="hint">Arrow keys, WASD, or swipe to steer</p>
            </div>
          </div>

          <div class="overlay" id="gameOverScreen">
            <div class="overlay-panel">
              <p class="eyebrow">Run ended</p>
              <h2>Game Over</h2>
              <div class="result-grid">
                <div>
                  <span>Final score</span>
                  <strong id="finalScore">0</strong>
                </div>
                <div>
                  <span>Best score</span>
                  <strong id="finalBest">0</strong>
                </div>
              </div>
              <button class="game-button" id="restartButton" type="button">Play Again</button>
            </div>
          </div>
        </section>

        <footer class="game-footer">
          <span>Arrow keys / WASD</span>
          <span>Swipe ready</span>
          <span>Local best score</span>
        </footer>
      </section>
    </main>

    <script src="./game.js" defer></script>
  </body>
</html>
