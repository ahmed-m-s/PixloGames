    <g fill="url(#cell)" stroke="#ffffff" stroke-opacity=".12" stroke-width="2">
      <rect x="22" y="22" width="76" height="76" rx="14"/>
      <rect x="112" y="22" width="76" height="76" rx="14"/>
      <rect x="202" y="22" width="76" height="76" rx="14"/>
      <rect x="22" y="112" width="76" height="76" rx="14"/>
      <rect x="112" y="112" width="76" height="76" rx="14"/>
      <rect x="202" y="112" width="76" height="76" rx="14"/>
      <rect x="22" y="202" width="76" height="76" rx="14"/>
      <rect x="112" y="202" width="76" height="76" rx="14"/>
      <rect x="202" y="202" width="76" height="76" rx="14"/>
    </g>
    <g fill="none" stroke-linecap="round" stroke-width="10" filter="url(#glow)">
      <path d="M42 42l36 36M78 42L42 78" stroke="#62ffae"/>
      <circle cx="150" cy="60" r="21" stroke="#6bdcff"/>
