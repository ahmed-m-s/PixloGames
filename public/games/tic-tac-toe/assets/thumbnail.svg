  <text x="44" y="370" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900">Tic Tac Toe</text>
  <text x="46" y="394" fill="#a6b1c2" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Quick local strategy</text>
