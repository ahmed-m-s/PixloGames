<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Tic Tac Toe thumbnail</title>
  <desc id="desc">A polished neon tic tac toe board with X and O marks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#121829"/>
      <stop offset="1" stop-color="#05070c"/>
    </linearGradient>
    <linearGradient id="cell" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#223047"/>
      <stop offset="1" stop-color="#0d1321"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="420" rx="32" fill="url(#bg)"/>
  <circle cx="118" cy="86" r="112" fill="#62ffae" opacity=".12"/>
  <circle cx="540" cy="332" r="150" fill="#6bdcff" opacity=".12"/>
  <g transform="translate(170 70)">
